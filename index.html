<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>即將進入賣貨便，請確認是否成年？</title>

  <!-- SEO：不要被搜尋引擎索引，不要顯示在搜尋結果 -->
  <meta name="robots" content="noindex, nofollow"/>

  <!-- 防止被 iframe 嵌入（安全） -->
  <meta http-equiv="X-Frame-Options" content="DENY"/>

  <style>
    /* ── 基礎重置 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --serif: 'Noto Serif TC', Georgia, serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000000;
      font-family: var(--serif);
      /* 頁面本身就是全黑背景，彈窗一打開幾乎感覺不到有跳板 */
    }

    /* ── Modal overlay（頁面載入就顯示）── */
    .age-modal-overlay {
      display: flex;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: modalFadeIn 0.45s ease forwards;
    }
    @keyframes modalFadeIn {
      from { opacity:0; }
      to   { opacity:1; }
    }

    .age-modal-box {
      background: linear-gradient(160deg, #111010 0%, #0a0909 100%);
      border: 1px solid rgba(255,255,255,0.18);
      max-width: 400px;
      width: 100%;
      text-align: center;
      position: relative;
      padding: 40px 36px 28px;
      overflow: hidden;
      animation: modalSlideIn 0.45s cubic-bezier(0.2,0.8,0.2,1) forwards;
    }
    @keyframes modalSlideIn {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── 四角裝飾 ── */
    .age-modal-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: rgba(255,255,255,0.55);
      border-style: solid;
    }
    .age-modal-corner.tl { top:-1px;    left:-1px;   border-width:1.5px 0 0 1.5px; }
    .age-modal-corner.tr { top:-1px;    right:-1px;  border-width:1.5px 1.5px 0 0; }
    .age-modal-corner.bl { bottom:-1px; left:-1px;   border-width:0 0 1.5px 1.5px; }
    .age-modal-corner.br { bottom:-1px; right:-1px;  border-width:0 1.5px 1.5px 0; }

    /* ── 左下角 compass ── */
    .age-modal-emblem-corner {
      position: absolute;
      bottom: -32px;
      left: -32px;
      width: 130px;
      height: 130px;
      color: rgba(255,255,255,0.55);
      pointer-events: none;
    }
    .age-modal-emblem-corner svg { width:100%; height:100%; }

    /* ── 頂部菱形 ── */
    .age-modal-diamond {
      font-size: 10px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    /* ── eyebrow ── */
    .age-modal-eyebrow {
      font-family: var(--serif);
      font-size: 10px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.55);
      margin: 0 0 18px;
    }

    /* ── 標題區 ── */
    .age-modal-title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 20px;
    }
    .age-modal-rule-short {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3));
    }
    .age-modal-title-wrap .age-modal-rule-short:last-child {
      background: linear-gradient(90deg, rgba(255,255,255,0.3), transparent);
    }
    .age-modal-title {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 6px;
      color: #ffffff;
      margin: 0;
      white-space: nowrap;
    }

    /* ── 紅色警語框 ── */
    .age-modal-alert {
      padding: 14px 16px;
      border: 1px solid rgba(190,50,50,0.45);
      border-radius: 3px;
      background: rgba(90,10,10,0.18);
      margin-bottom: 0;
      animation: alertPulse 3s ease-in-out infinite;
    }
    @keyframes alertPulse {
      0%,100% { border-color:rgba(180,40,40,0.38); box-shadow:none; }
      50%      { border-color:rgba(225,75,75,0.75); box-shadow:0 0 18px rgba(160,30,30,0.22), inset 0 0 10px rgba(150,20,20,0.1); }
    }
    .ama-title {
      font-family: var(--serif);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 3px;
      color: rgb(235,90,90);
      margin-bottom: 10px;
      animation: amaTitlePulse 3s ease-in-out infinite;
    }
    @keyframes amaTitlePulse {
      0%,100% { text-shadow:0 0 4px rgba(220,80,80,0.3); }
      50%      { text-shadow:0 0 12px rgba(225,80,80,0.8), 0 0 28px rgba(200,50,50,0.35); }
    }
    .ama-rule {
      width: 40%;
      height: 1px;
      margin: 0 auto 10px;
      background: linear-gradient(90deg, transparent, rgba(200,60,60,0.4), transparent);
    }
    .ama-body {
      font-family: var(--serif);
      font-size: 12px;
      letter-spacing: 0.8px;
      line-height: 1.9;
      color: rgba(255,255,255,0.78);
      text-align: center;
    }

    /* ── 主分隔線 ── */
    .age-modal-rule {
      width: 55%;
      height: 1px;
      margin: 22px auto 20px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }

    /* ── 按鈕 ── */
    .age-modal-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .age-btn {
      width: 100%;
      padding: 13px 20px;
      font-family: var(--serif);
      font-size: 12px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.8);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.28);
      cursor: pointer;
      transition: border-color 0.3s, color 0.3s, background 0.3s;
    }
    .age-btn:hover {
      border-color: rgba(255,255,255,0.6);
      color: #ffffff;
      background: rgba(255,255,255,0.05);
    }

    /* ── 底部裝飾 ── */
    .age-modal-footer-deco {
      margin-top: 18px;
      font-size: 8px;
      letter-spacing: 6px;
      color: rgba(255,255,255,0.2);
    }

    /* ── 未成年提示 ── */
    .age-deny-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      animation: modalFadeIn 0.4s ease forwards;
    }
    .age-deny-msg.show { display: flex; }
    .age-deny-msg p {
      font-family: var(--serif);
      font-size: 14px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      line-height: 2;
    }
    .age-deny-msg span {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.2);
    }
  </style>

  <!-- Noto Serif TC（跟主網站一致） -->

  <!-- ── 年齡驗證彈窗 ── -->
  <div id="age-modal" class="age-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="age-modal-title">
    <div class="age-modal-box">

      <div class="age-modal-corner tl"></div>
      <div class="age-modal-corner tr"></div>
      <div class="age-modal-corner bl"></div>
      <div class="age-modal-corner br"></div>

      <div class="age-modal-emblem-corner">
        <svg viewBox="0 0 220 220" aria-hidden="true"><use href="#compass" /></svg>
      </div>

      <div class="age-modal-diamond">◆</div>
      <p class="age-modal-eyebrow">黑森林出口　·　限制級</p>

      <div class="age-modal-title-wrap">
        <div class="age-modal-rule-short"></div>
        <h1 class="age-modal-title" id="age-modal-title">成人內容確認</h1>
        <div class="age-modal-rule-short"></div>
      </div>

      <div class="age-modal-alert">
        <div class="ama-title">⚠　R18　成人限制級內容</div>
        <div class="ama-rule"></div>
        <div class="ama-body">
          此作品僅適合年滿 18 歲以上人士進行瀏覽<br/>
          （或合乎您所在地的合法成年年齡），<br/>
          且不得將內容以任何形式給予未滿 18 歲人士瀏覽。<br/><br/>
          請問您是否已滿 18 歲？
        </div>
      </div>

      <div class="age-modal-rule"></div>

      <div class="age-modal-btns">
        <button class="age-btn" id="btn-confirm">已滿 18 歲，進入賣貨便</button>
        <button class="age-btn" id="btn-deny">尚未成年，先行離開</button>
      </div>

      <div class="age-modal-footer-deco">✦　✦　✦</div>

    </div>
  </div>

  <!-- ── 未成年提示畫面 ── -->
  <div id="age-deny-msg" class="age-deny-msg">
    <p>✦ 感謝理解<br/>歡迎成年後再來黑森林</p>
  </div>

  <script>
    const DEST_URL   = 'https://myship.7-11.com.tw/general/detail/GM2411116895050';
    const GAS_URL    = 'https://script.google.com/macros/s/AKfycbyykxHDqhrTtg9eUe0Yuoyf25dM9MtGYZ4Alom7gf9KxJzmcBaXTHzqbizKfAmrEAGG/exec';
    const GAS_TOKEN  = 'ujhgoiejhayEUdwodswroigjegpAtiuh0rtuhrathy';

    // ── 工具：產生裝置 ID ──
    function getClientId() {
      let cid = localStorage.getItem('agegate_client_id');
      if (!cid) {
        cid = 'ag_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        localStorage.setItem('agegate_client_id', cid);
      }
      return cid;
    }

    // ── 工具：偵測 Mobile/Desktop ──
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ? 'Mobile' : 'Desktop';
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'unknown';

    // ── 發送追蹤到 GAS（靜默背景，不影響主流程）──
    function track(action) {
      fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({
          token:      GAS_TOKEN,
          resultCode: 'A_CONTROL_1', // 佔位用，GAS 白名單需要合法 code
          action:     action,
          clientId:   getClientId(),
          source:     new URLSearchParams(window.location.search).get('utm_source') || 'age-gate',
          referrer:   document.referrer || 'none',
          device:     isMobile,
          country:    tz,
          city:       tz,
          timeSpent:  0
        })
      }).catch(() => {});
    }

    // ── 按鈕事件 ──
    document.getElementById('btn-confirm').addEventListener('click', function () {
      track('click_maihuobian_confirm');
      location.replace(DEST_URL);
    });

    document.getElementById('btn-deny').addEventListener('click', function () {
      track('click_maihuobian_deny');
      document.getElementById('age-modal').style.display = 'none';
      const msg = document.getElementById('age-deny-msg');
      msg.classList.add('show');
      setTimeout(function () { window.close(); }, 3000);
    });
  </script>
